<!DOCTYPE html>

 <html>

    <head>

        <meta charset = "utf-8">

        <title>Travel App Map Testing</title>

        <style>
            html, body, #map {
                height: 100%;
                margin: 0;
                padding: 0;
            }
        </style>

    </head>

    <body>

        <div id="map"></div>

        <script>
            let map;
            let markers = [];

            function initMap(){
                map = new google.maps.Map(document.getElementById("map"), {
                    center: {lat: 48.2082, lng: 16.3738}, 
                    zoom: 12
                });
            }

            function addMarker(lat, lng, title){
                const mark = new google.map.Marker({
                    position: {lat: lat, lng: lng},
                    map: map,
                    title: title
                });
                markers.push(marker);

                map.panTo({lat: lat, lng: lng});
            }

            function clearMarkers(){
                markers.forEach(m => m.setMap(null));
                markers = [];
            }
        </script>

        <script
            src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDGQA1huoGom8rkzzxVnGostW2HEjxMpgI&callback=initMap"
            async defer>
        </script>

    </body>

 </html>
